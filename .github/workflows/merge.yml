name: Merge group configs

on:
  push:
    branches: [main]
    paths:
      - 'groups/**.yml'

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge group configs into .doco-cd.yml
        run: |
          output=".doco-cd.yml"
          > "$output"
          first=true
          for f in $(ls groups/*.yml | sort); do
            if [ "$first" = true ]; then
              first=false
            else
              echo "---" >> "$output"
            fi
            cat "$f" >> "$output"
            echo "" >> "$output"
          done
          echo "Generated .doco-cd.yml:"
          cat "$output"

      - name: Commit merged config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .doco-cd.yml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: regenerate .doco-cd.yml from groups/"
          git push
