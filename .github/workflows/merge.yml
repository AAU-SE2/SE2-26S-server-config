name: Merge group configs

on:
  push:
    branches: [main]
    paths:
      - "groups/**.yml"

concurrency:
  group: merge-doco-cd
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Merge group configs into .doco-cd.yml
        run: |
          output=".doco-cd.yml"
          > "$output"
          first=true
          for f in groups/*.yml; do
            if [ "$first" = true ]; then
              first=false
            else
              echo "---" >> "$output"
            fi
            cat "$f" >> "$output"
            echo "" >> "$output"
          done
          echo "Generated .doco-cd.yml:"
          cat "$output"

      - name: Commit merged config
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate .doco-cd.yml from groups/"
          file_pattern: .doco-cd.yml
